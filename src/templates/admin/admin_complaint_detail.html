<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Complaint Detail - Admin | GrievEase</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Theme Engine -->
    <script src="../../js/shared/theme-engine.js" defer></script>
    <script src="../../js/shared/dashboard.js" defer></script>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../css/shared/dashboard.css">

    <!-- Page Styles -->
    <link rel="stylesheet" href="../../css/admin/admin_complaint_detail.css">

</head>

<body>

    <div class="dashboard-wrapper">

        <header class="dashboard-header">
            <h1 class="header-title">Complaint Detail</h1>
            <div class="user-info">
                <span>Admin Panel</span>
            </div>
        </header>

        <div class="main-layout">

            <!-- SIDEBAR -->
            <aside class="sidebar-nav">

                <a href="./admin_dashboard.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>

                <a href="./admin_complaints.html" class="nav-item active">
                    <i class="fas fa-folder-open"></i>
                    <span>Complaints</span>
                </a>

                <a href="./admin_notes.html" class="nav-item">
                    <i class="fas fa-sticky-note"></i>
                    <span>Admin Notes</span>
                </a>

                <a href="#" class="nav-item logout-sidebar-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>

            </aside>

            <!-- MAIN CONTENT -->
            <main class="dashboard-content">

                <!-- SUMMARY -->
                <div class="card summary-card">

                    <div class="summary-header">
                        <h2 id="complaint-title">Loading...</h2>
                        <span id="status-badge" class="status-badge"></span>
                    </div>

                    <div class="summary-grid">

                        <div>
                            <span class="label">Complaint ID</span>
                            <span class="value" id="complaint-id"></span>
                        </div>

                        <div>
                            <span class="label">Category</span>
                            <span class="value" id="complaint-category"></span>
                        </div>

                        <div>
                            <span class="label">Student Name</span>
                            <span class="value" id="student-name"></span>
                        </div>

                        <div>
                            <span class="label">Date Submitted</span>
                            <span class="value" id="created-date"></span>
                        </div>

                    </div>
                </div>

                <!-- DESCRIPTION -->
                <div class="card">

                    <h3>Complaint Description</h3>

                    <p class="description-text" id="complaint-description"></p>

                    <div class="attachment" id="attachment-section">
                        <i class="fas fa-image"></i>
                        <span id="attachment-name"></span>
                    </div>

                </div>

                <!-- UPDATE STATUS -->
                <div class="card action-card">

                    <h3>Update Complaint</h3>

                    <div class="action-grid">

                        <div>
                            <label>Status</label>
                            <select id="status-select">
                                <option value="submitted">Submitted</option>
                                <option value="under_review">Under Review</option>
                                <option value="in_progress">In Progress</option>
                                <option value="resolved">Resolved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>

                        <div>
                            <label>Priority</label>
                            <select id="priority-select">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                    </div>

                </div>

                <!-- TIMELINE -->
                <div class="card">

                    <h3>Complaint Timeline</h3>

                    <ul class="timeline"></ul>

                </div>

                <!-- REMARKS -->
                <div class="card">

                    <h3>Admin Remarks (Internal)</h3>
                    <textarea id="internal-remarks" placeholder="Visible to admins only..."></textarea>

                    <h3 class="mt">Public Response (Visible to Student)</h3>
                    <textarea id="public-response" placeholder="This will be shown to the student..."></textarea>

                    <button class="primary-btn save-btn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>

                </div>

            </main>
        </div>
    </div>

    <script src="../../js/admin/admin_complaint_detail.js"></script>

</body>

</html>
