<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Grievance Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="../../css/shared/dashboard.css">
    <link rel="stylesheet" href="../../css/student/profile.css">

    <script src="../../js/shared/theme-engine.js" defer></script>
    <script src="../../js/shared/dashboard.js" defer></script>
    <script src="../../js/student/profile.js" defer></script>

</head>

<body>

    <div class="dashboard-wrapper">

        <header class="dashboard-header">
            <h1 class="header-title">My Profile</h1>

            <div class="user-info">

                <div class="user-avatar" id="user-avatar">A</div>

                <span id="student-name">Welcome</span>

                <button class="logout-btn mobile-logout" id="logout-btn-mobile">
                    <i class="fas fa-sign-out-alt"></i>
                </button>

            </div>
        </header>


        <div class="main-layout">

            <!-- SIDEBAR -->
           <aside class="sidebar-nav">
                <a href="./student_dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i> Dashboard
                </a>

                <a href="./profile.html" class="nav-item active">
                    <i class="fas fa-user"></i> My Profile
                </a>

                <div class="nav-item nav-parent" id="theme-parent">
                    <i class="fas fa-cog"></i> Theme
                    <i class="fas fa-chevron-right arrow-icon"></i>
                </div>

                <div class="theme-submenu" id="theme-submenu">
                    <button class="nav-sub-item" id="theme-light">
                        <i class="fas fa-sun"></i> Light
                    </button>
                    <button class="nav-sub-item" id="theme-dark">
                        <i class="fas fa-moon"></i> Dark
                    </button>
                </div>

                <a href="./help_support.html" class="nav-item">
                    <i class="fas fa-question-circle"></i> Help & Support
                </a>

                <a href="#" class="nav-item logout-sidebar-btn" id="logout-sidebar-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>

            </aside>


            <!-- MAIN CONTENT -->
            <main class="dashboard-content">

                <div class="profile-card">

                    <div class="avatar" id="avatar-letter">A</div>

                    <div class="profile-details">
                        <h2 id="profile-name">Student Name</h2>

                        <p class="profile-info">
                            <i class="fas fa-id-card"></i>
                            <span id="profile-id">Student ID</span>
                        </p>

                        <p class="profile-info">
                            <i class="fas fa-envelope"></i>
                            <span id="profile-email">student@email.com</span>
                        </p>

                    </div>

                </div>


                <!-- STATS -->
                <div class="stats-grid">

                    <div class="stat-box">
                        <h3>Total Complaints</h3>
                        <p id="totalComplaints">0</p>
                    </div>

                    <div class="stat-box">
                        <h3>Resolved</h3>
                        <p id="resolvedComplaints">0</p>
                    </div>

                    <div class="stat-box">
                        <h3>Pending</h3>
                        <p id="pendingComplaints">0</p>
                    </div>

                    <div class="stat-box">
                        <h3>Rejected</h3>
                        <p id="rejectedComplaints">0</p>
                    </div>

                </div>

            </main>

        </div>

    </div>

</body>

</html>
